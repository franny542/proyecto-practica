<nav class="navbar">
  <div class="navbar-container">
    
    <a routerLink="/" class="brand">RUKANO</a>
    
    <div class="navbar-busqueda">
      <input 
        type="text" 
        placeholder="Buscar servicios para tu hogar..." 
        class="input-navbar"
      >
      <svg class="lupa-navbar" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" />
      </svg>
    </div>
    
    <div class="links">
      <a routerLink="/" routerLinkActive="active" [routerLinkActiveOptions]="{exact: true}">Inicio</a>
      <a routerLink="/policies" routerLinkActive="active">Políticas</a>
      
      <a *ngIf="authService.isLoggedIn() && authService.getUserRole() === 'usuario'" routerLink="/ultimas-conexiones" routerLinkActive="active">Últimas Conexiones</a>
      
      <a *ngIf="authService.isLoggedIn() && authService.getUserRole() === 'admin'" routerLink="/admin-policies" routerLinkActive="active">Admin</a>
      <a *ngIf="authService.isLoggedIn() && authService.getUserRole() === 'admin'" routerLink="/configuracion" routerLinkActive="active">Configuración</a>
      
      <a *ngIf="!authService.isLoggedIn()" routerLink="/login" class="btn-login-nav">Iniciar Sesión</a>
      
      <a *ngIf="authService.isLoggedIn()" (click)="authService.logout()" class="btn-login-nav" style="background-color: #e12a3d; cursor: pointer;">Cerrar Sesión</a>
    </div>

  </div>
</nav>
