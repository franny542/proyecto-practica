<div class="register-container">
  <div class="register-card">
    <h2>Crear Cuenta</h2>
    <p class="subtitle">Regístrate aquí</p>

    <form [formGroup]="registerForm" (ngSubmit)="onSubmit()">
      
      <div class="form-group">
        <label for="correo">Correo Electrónico</label>
        <input 
          type="email" 
          id="correo" 
          formControlName="correo" 
          placeholder="ejemplo@correo.com"
          [class.error]="isFieldInvalid('correo')"
        />
        <span class="error-msg" *ngIf="isFieldInvalid('correo')">
          Por favor, ingresa un correo válido.
        </span>
      </div>

      <div class="form-group">
        <label for="password">Contraseña</label>
        <input 
          type="password" 
          id="password" 
          formControlName="password" 
          placeholder="••••••••"
          [class.error]="isFieldInvalid('password')"
        />
        <span class="error-msg" *ngIf="isFieldInvalid('password')">
          La contraseña es obligatoria (mínimo 6 caracteres).
        </span>
      </div>

      <div class="form-group">
        <label for="confirmPassword">Confirmar Contraseña</label>
        <input 
          type="password" 
          id="confirmPassword" 
          formControlName="confirmPassword" 
          placeholder="••••••••"
          [class.error]="registerForm.hasError('mismatch') && registerForm.get('confirmPassword')?.touched"
        />
        <span class="error-msg" *ngIf="registerForm.hasError('mismatch') && registerForm.get('confirmPassword')?.touched">
          Las contraseñas no coinciden.
        </span>
      </div>

      <div class="form-group">
        <label for="rol">Rol de Usuario</label>
        <select id="rol" formControlName="rol">
          <option value="usuario">Usuario Regular</option>
          <option value="admin">Administrador</option>
        </select>
      </div>

      <button type="submit" [disabled]="registerForm.invalid" class="btn-submit">
        Registrarse
      </button>

      <div class="login-redirect">
        <p>¿Ya tienes una cuenta? <a routerLink="/login" class="link-login">Inicia sesión aquí</a></p>
      </div>

    </form>
  </div>
</div>
