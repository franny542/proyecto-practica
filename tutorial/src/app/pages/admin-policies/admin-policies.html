<div *ngIf="permitido">
  <div class="admin-wrapper">
    
    <header class="admin-header">
      <h1 class="title">Panel de Administración</h1>
      <p>Crea, edita y gestiona las tarjetas informativas del sistema.</p>
    </header>

    <div *ngIf="message" class="alert-message" [class.alert-delete]="message.includes('🗑️')">
      <div class="alert-content">
        {{ message }}
      </div>
    </div>

    <div class="admin-dashboard-grid">
      
      <div class="form-card">
        <h2 class="form-title">
          {{ isEditing ? 'Editar Política' : 'Nueva Política' }}
        </h2>
        
        <form class="modern-form">
          <div class="form-group">
            <label>Título del Servicio</label>
            <input
              type="text"
              placeholder="Ej. Limpieza de alfombras profesionales"
              [(ngModel)]="policy.title"
              name="title"
              required
              autocomplete="off"
            >
          </div>

          <div class="form-group">
            <label>Descripción detallada</label>
            <textarea
              placeholder="Describe en qué consiste esta política o servicio..."
              [(ngModel)]="policy.description"
              name="description"
              required
              rows="5"
            ></textarea>
          </div>

          <div class="form-actions-buttons">
            <button 
              type="button"
              class="btn-submit"
              (click)="savePolicy()"
              [disabled]="isLoading"
            >
              <span>{{ isEditing ? 'Actualizar Cambios' : 'Publicar Política' }}</span>
            </button>

            <button 
              type="button" 
              class="btn-cancel" 
              *ngIf="isEditing" 
              (click)="resetForm()"
            >
              Cancelar
            </button>
          </div>
        </form>
      </div>

      <div class="cards-display-section">
        <h2 class="section-title">Políticas Activas ({{ policies.length }})</h2>
        
        <div class="cards-grid">
          <div class="card-item" *ngFor="let item of policies; trackBy: trackByPolicy">
            <div class="card-body">
              <span class="card-badge">ID #{{ item.id }}</span>
              <h3>{{ item.title }}</h3>
              <p>{{ item.description }}</p>
            </div>
            
            <div class="card-actions-bar">
              <button
                class="action-edit"
                (click)="editPolicy(item)"
                [disabled]="isLoading"
              >
                Editar
              </button>
              <button
                class="action-delete"
                (click)="deletePolicy(item.id)"
                [disabled]="isLoading"
              >
                Eliminar
              </button>
            </div>
          </div>
        </div>
      </div>

    </div>
  </div>
</div>
