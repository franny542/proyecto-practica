<div class="login-container">
  <div class="login-card">
    <h2>Iniciar Sesión</h2>
    <p class="subtitle">Accede al sistema de gestión de políticas</p>

    <form [formGroup]="loginForm" (ngSubmit)="onSubmit()">
      
      <div class="form-group">
        <label for="correo">Correo Electrónico</label>
        <input 
          type="email" 
          id="correo" 
          formControlName="correo" 
          placeholder="ejemplo@correo.com"
          [class.error]="isFieldInvalid('correo')"
        />
        <span class="error-msg" *ngIf="isFieldInvalid('correo')">
          Por favor, ingresa un correo válido.
        </span>
      </div>

      <div class="form-group">
        <label for="password">Contraseña</label>
        <input 
          type="password" 
          id="password" 
          formControlName="password" 
          placeholder="••••••••"
          [class.error]="isFieldInvalid('password')"
        />
        <span class="error-msg" *ngIf="isFieldInvalid('password')">
          La contraseña es obligatoria.
        </span>
      </div>

      <button type="submit" [disabled]="loginForm.invalid" class="btn-submit">
        Ingresar
      </button>

      <div class="register-redirect">
        <p>¿No tienes una cuenta? <a routerLink="/registro" class="link-register">Regístrate aquí</a></p>
      </div>

    </form>
  </div>
</div>
